<svg width="700" height="120" viewBox="0 0 700 120" xmlns="http://www.w3.org/2000/svg">
  <style>
    .name { font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; font-size: 42px; font-weight: 700; fill: #2e2e2e; }
    .role { font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; font-size: 14px; fill: #8a8a8a; letter-spacing: 3px; }
    .underline { stroke: #2e2e2e; stroke-width: 2; }
    .cursor { fill: #2e2e2e; animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
    @media (prefers-color-scheme: dark) {
      .name { fill: #eaeaea; }
      .role { fill: #9a9a9a; }
      .underline { stroke: #eaeaea; }
      .cursor { fill: #eaeaea; }
    }
  </style>

  <text x="350" y="52" text-anchor="middle" class="name">REHAN<tspan class="cursor">▌</tspan></text>

  <text x="350" y="78" text-anchor="middle" class="role">AGENTIC ENGINEER</text>

  <line x1="230" y1="95" x2="470" y2="95" class="underline" stroke-dasharray="240" stroke-dashoffset="240">
    <animate attributeName="stroke-dashoffset" from="240" to="0" dur="1s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </line>
</svg>
